<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Friends Viewer</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 2rem;
    }

    h1 {
      margin-bottom: 1rem;
    }

    .controls {
      display: flex;
      gap: 1rem;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 1rem;
    }

    input[type="number"] {
      padding: 0.5rem;
      width: 120px;
    }

    button {
      padding: 0.5rem 1rem;
      cursor: pointer;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      margin-top: 1rem;
    }

    th, td {
      border: 1px solid #ccc;
      padding: 0.6rem;
      text-align: left;
    }

    th {
      background-color: #f4f4f4;
    }

    .message {
      margin-top: 1rem;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <h1>Friends</h1>

  <div class="controls">
    <!-- Add Buttons and Text Input here-->
    <button type="button" onclick="loadAllFriends()">Load all friends</button>
  </div>

  <div id="message" class="message"></div>

  <table id="friendsTable">
    <thead>
      <tr>
        <th>First Name</th>
      </tr>
    </thead>
    <tbody>
    </tbody>
  </table>

  <script>
    const API_URL = "https://friends-node-01-47e26a48b0b0.herokuapp.com/friends";
    const tableBody = document.querySelector("#friendsTable tbody");
    const messageDiv = document.getElementById("message");

    function clearTable()
    {
      tableBody.innerHTML = "";
    }

    function showMessage(message)
    {
      messageDiv.textContent = message;
    }

    function addFriendRow(friend)
    {
    const row = document.createElement("tr");
    const fullName = `${friend.firstName}`.trim();

    row.innerHTML = `
        <td><a href="#" onclick="findFriend(${friend.id}); return false;">${fullName}</a></td>
        `;

    tableBody.appendChild(row);
    }

    async function loadAllFriends()
    {
       clearTable();   

        // part of jank display of friend details
    
        // Reset headers
        document.querySelector("#friendsTable thead tr").innerHTML = `
        <th>First Name</th>
        `;

        //end of part of jank display of friend details

        showMessage("Loading all friends...");

        friends.forEach(addFriendRow);
        showMessage(`Loaded ${friends.length} friend(s).`);
      }
      catch (error)
      {
        showMessage(`Error loading friends: ${error.message}`);
      }
    }

    async function findFriend(id)
    {
      if(id === "")
      {
        loadAllFriends();
        return; 
      }

      clearTable();

      try
      {
        const response = await fetch(`${API_URL}/${id}`);

        if(response.status === 404)
        {
          showMessage(`Friend with ID ${id} was not found.`);
          return;
        }

        if(!response.ok)
        {
          throw new Error(`HTTP error ${response.status}`);
        }

        const friend = await response.json();

        // jank way of doing it but lets just manually add the data like in
        // addFriendRow but without the link since we don't need it

        // Update the headers
        document.querySelector("#friendsTable thead tr").innerHTML = `
        <th>First Name</th>
        <th>Last Name</th>
        <th>Phone</th>
        `;

       const row = document.createElement("tr");

        //clear the table
        clearTable();

        row.innerHTML = `
            <td>${friend.firstName}</td>
            <td>${friend.lastName}</td>
            <td>${friend.phone}</td>
            `;

        tableBody.appendChild(row);

        //end of jank way.

        showMessage(`Showing ${friend.firstName}'s Details.`);
      }
      catch (error)
      {
        showMessage(`Error finding friend: ${error.message}`);
      }
    }
    

  </script>
</body>
</html>
